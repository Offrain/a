<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кейсы</title>

<style>
body { font-family: Arial; padding: 20px; }

.case {
    cursor: pointer;
    padding: 10px;
    margin: 8px 0;
    background: #d0ebff;
    font-weight: bold;
}

.questions {
    display: none;
    margin-left: 20px;
}

.question {
    cursor: pointer;
    padding: 6px;
    margin: 5px 0;
    background: #f1f3f5;
}

.answer {
    display: none;
    margin-top: 5px;
    color: green;
}
</style>
</head>

<body>

<h2>Кейсы</h2>
<div id="cases"></div>

<script>
fetch('base.txt')
.then(r => r.text())
.then(text => {

    const container = document.getElementById('cases');

    // делим по кейсам (@)
    const cases = text.split('\n@').map(c => c.trim()).filter(c => c);

    cases.forEach(c => {

        const lines = c.split('\n').map(l => l.trim()).filter(l => l);

        const title = lines[0].replace(/^@/, '');

        const caseDiv = document.createElement('div');
        caseDiv.className = 'case';
        caseDiv.textContent = title;

        const qWrap = document.createElement('div');
        qWrap.className = 'questions';

        lines.slice(1).forEach(line => {

            // делим по @@
            const parts = line.split('@@');
            if (parts.length < 2) return;

            const questionText = parts[0].replace(/^\d+\.\s*/, '').trim();
            const answerText = parts[1].trim();

            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.textContent = questionText;

            const aDiv = document.createElement('div');
            aDiv.className = 'answer';
            aDiv.textContent = answerText;

            qDiv.onclick = (e) => {
                e.stopPropagation();
                aDiv.style.display =
                    aDiv.style.display === 'none' ? 'block' : 'none';
            };

            qDiv.appendChild(aDiv);
            qWrap.appendChild(qDiv);
        });

        caseDiv.onclick = () => {
            qWrap.style.display =
                qWrap.style.display === 'none' ? 'block' : 'none';
        };

        container.appendChild(caseDiv);
        container.appendChild(qWrap);
    });

});
</script>

</body>
</html>
