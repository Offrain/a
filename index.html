<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кейсы</title>

<style>
:root {
    --bg: #f1f3f5;
    --card: #ffffff;
    --text: #111;
    --accent: #228be6;
}

.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --accent: #38bdf8;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text);
}

/* 🔝 HEADER */
header {
    display: flex;
    gap: 8px;
    padding: 10px;
    position: sticky;
    top: 0;
    background: var(--card);
    border-bottom: 1px solid #ccc;
    z-index: 100;
}

/* 🔘 КНОПКИ */
button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 14px;
}

/* 📱 КОНТЕЙНЕР */
#cases {
    padding: 10px;
    max-width: 600px;
    margin: auto;
}

/* 📦 КЕЙС */
.case {
    background: var(--card);
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 10px;
    font-weight: 600;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* ❓ ВОПРОС */
.question {
    background: rgba(0,0,0,0.05);
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
}

.dark .question {
    background: rgba(255,255,255,0.08);
}

/* ✅ ОТВЕТ */
.answer {
    display: none;
    margin-top: 6px;
    color: #22c55e;
    font-size: 14px;
}

/* 📱 МОБИЛКА */
@media (max-width: 500px) {
    button {
        font-size: 12px;
        padding: 8px;
    }

    .case {
        font-size: 14px;
    }

    .question {
        font-size: 13px;
    }
}
</style>
</head>

<body>

<header>
    <button onclick="toggleTheme()">🌙 Тема</button>
    <button onclick="showRandom()">🎲 Рандом</button>
    <button onclick="showAll()">📋 Все</button>
</header>

<div id="cases"></div>

<script>
let allCases = [];

fetch('base.txt')
.then(r => r.text())
.then(text => {

    const raw = text.split('\n@').map(c => c.trim()).filter(c => c);

    raw.forEach(c => {
        const lines = c.split('\n').map(l => l.trim()).filter(l => l);

        const title = lines[0].replace('@', '');
        const questions = [];

        lines.slice(1).forEach(line => {
            const parts = line.split('@@');
            if (parts.length < 2) return;

            questions.push({
                q: parts[0].replace(/^\d+\.\s*/, ''),
                a: parts[1]
            });
        });

        allCases.push({ title, questions });
    });

    render(allCases);
});

function render(list) {
    const container = document.getElementById('cases');
    container.innerHTML = '';

    list.forEach(c => {

        const caseDiv = document.createElement('div');
        caseDiv.className = 'case';
        caseDiv.textContent = c.title;

        const qWrap = document.createElement('div');
        qWrap.style.display = 'none';

        c.questions.forEach(q => {

            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.textContent = q.q;

            const aDiv = document.createElement('div');
            aDiv.className = 'answer';
            aDiv.textContent = q.a;

            qDiv.onclick = (e) => {
                e.stopPropagation();
                aDiv.style.display =
                    aDiv.style.display === 'none' ? 'block' : 'none';
            };

            qDiv.appendChild(aDiv);
            qWrap.appendChild(qDiv);
        });

        caseDiv.onclick = () => {
            qWrap.style.display =
                qWrap.style.display === 'none' ? 'block' : 'none';
        };

        container.appendChild(caseDiv);
        container.appendChild(qWrap);
    });
}

/* 🌙 тема */
function toggleTheme() {
    document.body.classList.toggle('dark');
}

/* 🎲 рандом */
function showRandom() {
    const one = allCases[Math.floor(Math.random() * allCases.length)];
    render([one]);
}

/* 📋 назад */
function showAll() {
    render(allCases);
}
</script>

</body>
</html>
