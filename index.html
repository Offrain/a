<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination { margin-top: 20px; }

.pagination button {
    margin: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

.active {
    background: blue;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="auth">
  <h2>Кіру</h2>

  <input id="email" placeholder="email"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>

  <button onclick="login()">Кіру</button>
  <button onclick="register()">Тіркелу</button>

  <p id="msg"></p>
</div>

<!-- 🔥 APP (ТВОЙ ТЕСТ) -->
<div id="app" style="display:none;">

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="shuffleCurrentPage()">Осы беттегі сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>
<button onclick="showAllAnswers()">Жауап көрсету</button>

<div id="quiz"></div>
<div id="pagination"></div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 ВСТАВЬ СЮДА СВОЙ CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCAL20P_NiAsJ54BHTW81FZba0FYNOc6SU",
  authDomain: "prst-99760.firebaseapp.com",
  projectId: "prst-99760",
  storageBucket: "prst-99760.firebasestorage.app",
  messagingSenderId: "72274793382",
  appId: "1:72274793382:web:8f0e20d0290e497985f567",
  measurementId: "G-WPPYRDL3ZE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ================= AUTH ================= */

window.register = async function () {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    setMsg("OK тіркелді");
  } catch (e) {
    setMsg(e.message);
  }
};

window.login = async function () {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    setMsg("OK кірді");
  } catch (e) {
    setMsg(e.message);
  }
};

window.logout = async function () {
  await signOut(auth);
};

/* ================= SHOW / HIDE ================= */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadTest();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

/* ================= YOUR TEST CODE ================= */

let currentPage = 1;
const questionsPerPage = 50;
let allQuestions = [];

async function loadTest() {
    try {
        const response = await fetch('test.txt');
        const text = await response.text();

        allQuestions = text
            .split('\n')
            .reduce((acc, line) => {
                line = line.trim();
                if (!line) return acc;

                if (line.startsWith('~~')) {
                    acc.push(line);
                } else if (acc.length > 0) {
                    acc[acc.length - 1] += '\n' + line;
                }

                return acc;
            }, [])
            .filter(Boolean);

        renderPage(currentPage);
        renderPagination();

    } catch (error) {
        document.getElementById('quiz').innerHTML =
            '<p style="color:red;">test.txt жүктелмеді</p>';
    }
}

function renderPage(page) {
    const start = (page - 1) * questionsPerPage;
    const end = start + questionsPerPage;
    renderCustomQuestions(allQuestions.slice(start, end), start);
}

function renderCustomQuestions(questionsArray, globalStartIndex = 0) {
    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    questionsArray.forEach((block, index) => {

        const lines = block.split('\n').map(l => l.trim()).filter(Boolean);

        let question = '';
        let variants = [];
        let correctIndex = 0;

        lines.forEach(line => {
            if (line.startsWith('~~')) {
                question = line.replace('~~', '').trim();
            } else if (line.startsWith('@@')) {
                variants.push(line.replace('@@', '').trim());
            }
        });

        const qIndex = globalStartIndex + index;
        const correctValue = variants[0];
        const shuffled = shuffle([...variants]);

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');
        p.textContent = (qIndex + 1) + '. ' + question;
        div.appendChild(p);

        shuffled.forEach(v => {
            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'q' + qIndex;
            input.value = v;

            input.onchange = () => {
                checkAnswer(qIndex, v, correctValue);
            };

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + v));
            div.appendChild(label);
        });

        const result = document.createElement('div');
        result.id = 'result' + qIndex;
        div.appendChild(result);

        quiz.appendChild(div);
    });
}

function checkAnswer(qIndex, selected, correctValue) {
    const result = document.getElementById('result' + qIndex);

    if (selected === correctValue) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.textContent = 'Қате ❌';
        result.className = 'incorrect';
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/* pagination simplified */
function renderPagination() {}

function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    renderPage(currentPage);
}

function shuffleCurrentPage() {}

function resetAll() {
    loadTest();
}

function showAllAnswers() {}

/* ================= HELPERS ================= */

function emailEl() {
    return document.getElementById("email");
}
function passEl() {
    return document.getElementById("pass");
}
function setMsg(t) {
    document.getElementById("msg").innerText = t;
}

</script>

</body>
</html>
